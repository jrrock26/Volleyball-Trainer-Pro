workflows:
  ios-dev-client:
    name: iOS Development Client
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: latest
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
      groups:
        - expo_credentials

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Install EAS CLI globally
        script: npm install -g eas-cli

      - name: Build iOS Dev Client with EAS
        script: |
          export EXPO_TOKEN=$EXPO_TOKEN
          eas build --platform ios --profile development --non-interactive

    artifacts:
      - build/**/*
    publishing:
      email:
        recipients:
          - jrrock26@gmail.com
        notify:
          success: true
          failure: true

  ios-testflight:
    name: iOS TestFlight Build
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: latest
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
      groups:
        - expo_credentials

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Install EAS CLI globally
        script: npm install -g eas-cli

      - name: Build iOS Production App with EAS
        script: |
          export EXPO_TOKEN=$EXPO_TOKEN
          eas build --platform ios --profile production --non-interactive --auto-submit

    artifacts:
      - build/**/*
    publishing:
      email:
        recipients:
          - jrrock26@gmail.com
        notify:
          success: true
          failure: true

