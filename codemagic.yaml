workflows:
  ios-dev-client:
    name: iOS Development Client
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: latest
      groups:
        - expo_credentials
    scripts:
      - name: Configure npm for TensorFlow
        script: |
          echo "legacy-peer-deps=true" >> .npmrc
          echo "strict-peer-deps=false" >> .npmrc

      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Install EAS CLI
        script: npm install -g eas-cli

      - name: Build iOS Dev Client locally
        script: |
          eas build --profile development --platform ios --local --output build.ipa

    artifacts:
      - build.ipa

    publishing:
      email:
        recipients:
          - jrrock26@gmail.com
        notify:
          success: true
          failure: true

  ios-testflight:
    name: iOS TestFlight Build
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: latest
      groups:
        - app_store_credentials
    scripts:
      - name: Configure npm for TensorFlow
        script: |
          echo "legacy-peer-deps=true" >> .npmrc
          echo "strict-peer-deps=false" >> .npmrc

      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Install EAS CLI
        script: npm install -g eas-cli

      - name: Build iOS Production App locally
        script: |
          eas build --profile production --platform ios --local --output build.ipa

      - name: Upload to App Store Connect
        script: |
          xcrun altool --upload-app \
            --type ios \
            --file build.ipa \
            --username "$APP_STORE_CONNECT_USERNAME" \
            --password "$APP_STORE_CONNECT_PASSWORD"

    artifacts:
      - build.ipa

    publishing:
      email:
        recipients:
          - jrrock26@gmail.com
        notify:
          success: true
          failure: true
