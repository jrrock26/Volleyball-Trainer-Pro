workflows:
  ios-ml-build:
    name: iOS ML Build (Native ML + Expo SDK 50)

    working_directory: VolleyballTrainerProClean

    environment:
      vars:
        NODE_OPTIONS: "--max-old-space-size=4096"
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install JS dependencies
        script: |
          npm install

      - name: Regenerate iOS folder (Expo prebuild)
        script: |
          rm -rf ios
          npx expo prebuild --platform ios

      - name: Copy ML models into iOS build
        script: |
          mkdir -p ios/MLModels
          cp -R MLModels/* ios/MLModels/

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project ios/VolleyballTrainerPro.xcodeproj \
            --scheme VolleyballTrainerPro

    artifacts:
      - build/ios/ipa/*.ipa
