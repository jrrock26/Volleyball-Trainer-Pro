workflows:
  ios-ml-build:
    name: iOS ML Build (Native ML + Expo SDK 50)
    environment:
      vars:
        NODE_OPTIONS: "--max-old-space-size=4096"
        EXPO_NO_PREBUILD: "1"   # ← THIS DISABLES EXPO AUTOLINKING
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install JS dependencies
        script: |
          npm install

      - name: Copy ML models into iOS build
        script: |
          mkdir -p ios/MLModels
          cp -R MLModels/* ios/MLModels/

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project ios/VolleyballTrainerPro.xcodeproj \
            --scheme VolleyballTrainerPro

    artifacts:
      - build/ios/ipa/*.ipa
