workflows:
  ios-dev-client:
    name: iOS Development Client (Native Build)
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
      node: latest
      groups:
        - APP_CREDENTIALS

    scripts:
      - name: Install dependencies
        script: |
          npm install
          cd ios
          pod install
          cd ..

      - name: Build iOS Dev Client (Xcode)
        script: |
          xcodebuild \
            -workspace ios/VTPDev.xcworkspace \
            -scheme VTPDev \
            -configuration Debug \
            -sdk iphoneos \
            -archivePath build/VTPDev.xcarchive \
            archive

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath build/VTPDev.xcarchive \
            -exportOptionsPlist ios/exportOptionsDev.plist \
            -exportPath build

    artifacts:
      - build/**/*.ipa
      - build/**/*.dSYM.zip

    publishing:
      email:
        recipients:
          - jrrock26@gmail.com
        notify:
          success: true
          failure: true

  ios-testflight:
    name: iOS TestFlight Build (Native Build)
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
      node: latest
      groups:
        - APP_CREDENTIALS

    scripts:
      - name: Install dependencies
        script: |
          npm install
          cd ios
          pod install
          cd ..

      - name: Build iOS Release (Xcode)
        script: |
          xcodebuild \
            -workspace ios/VTPDev.xcworkspace \
            -scheme VTPDev \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/VTPDev.xcarchive \
            archive

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath build/VTPDev.xcarchive \
            -exportOptionsPlist ios/exportOptionsAppStore.plist \
            -exportPath build

      - name: Upload to TestFlight
        script: |
          xcrun altool --upload-app \
            -f build/VTPDev.ipa \
            -t ios \
            -u "$APP_STORE_CONNECT_USERNAME" \
            -p "$APP_STORE_CONNECT_PASSWORD"

    artifacts:
      - build/**/*.ipa
      - build/**/*.dSYM.zip

    publishing:
      email:
        recipients:
          - jrrock26@gmail.com
        notify:
          success: true
          failure: true
