workflows:
  ios-dev-client:
    name: iOS Dev Client (No Signing, Auto IPA)

    instance_type: mac_mini_m2

    environment:
      xcode: latest
      node: latest

    scripts:
      - name: Install JS dependencies
        script: npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS Dev Client (no signing)
        script: |
          cd ios
          xcodebuild \
            -workspace VolleyballTrainerPro.xcworkspace \
            -scheme VolleyballTrainerPro \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA (no signing)
        script: |
          cd ios/build/Debug-iphoneos
          mkdir Payload
          cp -R VolleyballTrainerPro.app Payload/
          zip -r VolleyballTrainerPro.ipa Payload

    artifacts:
      - ios/build/Debug-iphoneos/VolleyballTrainerPro.ipa
