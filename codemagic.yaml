workflows:
  ios-ml-build:
    name: iOS ML Build (Native ML + Expo SDK 50)

    instance_type: mac_mini_m2

    environment:
      xcode: latest
      node: latest

    scripts:
      - name: Install JS dependencies
        script: npm install

      - name: Clean CocoaPods cache (fix boost checksum)
        script: |
          pod cache clean boost --all || true
          rm -rf "$HOME/Library/Caches/CocoaPods" || true
          rm -rf "$HOME/Library/Caches/org.cocoapods.CocoaPods" || true

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS IPA
        script: |
          cd ios
          xcodebuild \
            -workspace VolleyballTrainerPro.xcworkspace \
            -scheme VolleyballTrainerPro \
            -configuration Release \
            -archivePath ../build/App.xcarchive archive

          xcodebuild \
            -exportArchive \
            -archivePath ../build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ../build

    artifacts:
      - build/*.ipa
