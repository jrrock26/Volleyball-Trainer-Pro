workflows:
  ios-dev-client:
    name: iOS Dev Client (No Signing)

    instance_type: mac_mini_m2

    environment:
      xcode: latest
      node: latest

    scripts:
      - name: Install JS dependencies
        script: npm install

      - name: Clean CocoaPods cache
        script: |
          pod cache clean boost --all || true
          rm -rf "$HOME/Library/Caches/CocoaPods" || true
          rm -rf "$HOME/Library/Caches/org.cocoapods.CocoaPods" || true

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS Dev Client (no signing)
        script: |
          cd ios
          xcodebuild \
            -workspace VolleyballTrainerPro.xcworkspace \
            -scheme VolleyballTrainerPro \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            build

    artifacts:
      - ios/build/Build/Products/Debug-iphoneos/*.app
