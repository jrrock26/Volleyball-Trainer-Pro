workflows:
  ios-eas-build:
    name: iOS EAS Build (Restored)
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      groups:
        - APP_CREDENTIALS

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install EAS CLI
        script: |
          npm install -g eas-cli

      - name: Run EAS Build (Development)
        script: |
          eas build --platform ios --profile development --non-interactive

    artifacts:
      - build/**/*
    publishing:
      email:
        recipients:
          - jrrock26@gmail.com
        notify:
          success: true
          failure: true

  ios-eas-production:
    name: iOS EAS Production Build (Restored)
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      groups:
        - APP_CREDENTIALS

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install EAS CLI
        script: |
          npm install -g eas-cli

      - name: Run EAS Build (Production)
        script: |
          eas build --platform ios --profile production --non-interactive --auto-submit

    artifacts:
      - build/**/*
    publishing:
      email:
        recipients:
          - jrrock26@gmail.com
        notify:
          success: true
          failure: true

