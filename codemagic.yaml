workflows:
  ios-app:
    name: iOS Native App Build

    instance_type: mac_mini_m2

    environment:
      xcode: latest
      node: latest

    scripts:
      - name: Install JS dependencies
        script: npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS archive
        script: |
          cd ios
          xcodebuild \
            -workspace VolleyballTrainerPro.xcworkspace \
            -scheme VolleyballTrainerPro \
            -configuration Release \
            -archivePath ../build/App.xcarchive \
            -allowProvisioningUpdates \
            archive

      - name: Export IPA
        script: |
          cd ios
          xcodebuild \
            -exportArchive \
            -archivePath ../build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ../build

    artifacts:
      - build/*.ipa
