workflows:
  ios-dev-client:
    name: iOS Development Client
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: latest

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Install EAS CLI globally
        script: npm install -g eas-cli

      - name: Build iOS Dev Client with EAS (Local)
        script: |
          eas build --local --platform ios --profile development

    artifacts:
      - build/**/*
    publishing:
      email:
        recipients:
          - jrrock26@gmail.com
        notify:
          success: true
          failure: true

  ios-testflight:
    name: iOS TestFlight Build
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: latest

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Install EAS CLI globally
        script: npm install -g eas-cli

      - name: Build iOS Production App with EAS (Local)
        script: |
          eas build --local --platform ios --profile production

    artifacts:
      - build/**/*
    publishing:
      email:
        recipients:
          - jrrock26@gmail.com
        notify:
          success: true
          failure: true
